services:
  app:
    image: ghcr.io/sourcedopen/docket:latest
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:8080'
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage

  scheduler:
    image: ghcr.io/sourcedopen/docket:latest
    restart: unless-stopped
    command: ['php', '/var/www/html/artisan', 'schedule:work']
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    image: ghcr.io/sourcedopen/docket:latest
    restart: unless-stopped
    command: ['php', '/var/www/html/artisan', 'queue:work']
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE:-docket}'
      MYSQL_USER: '${DB_USERNAME:-docket}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional — required when using Laravel Horizon as the queue driver
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ['CMD', 'redis-cli', 'ping']
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # Optional — uncomment if using Horizon instead of the default queue worker
  # horizon:
  #   image: ghcr.io/sourcedopen/docket:latest
  #   restart: unless-stopped
  #   command: ['php', '/var/www/html/artisan', 'horizon']
  #   env_file:
  #     - .env
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  mysql-data:
  storage:
  # redis-data:
